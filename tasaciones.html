<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Tasaciones - Rodrigo Sarmiento</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <a href="index.html">← Volver al inicio</a>
    <h1>Solicitud de Tasación</h1>
  </header>
  
  <main>
    <p>Por favor, complete el siguiente formulario con sus datos y las características de la propiedad.</p>
    
    <form action="procesar.php" method="POST">
      
      <fieldset>
        <legend>Datos Personales</legend>
        
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" required />
        <br><br>

        <label for="apellido">Apellido:</label>
        <input type="text" id="apellido" name="apellido" required />
        <br><br>

        <label for="mail">Correo Electrónico:</label>
        <input type="email" id="mail" name="mail" required />
        <br><br>

        <label for="telefono">Teléfono:</label>
        <input type="tel" id="telefono" name="telefono" required />
      </fieldset>
      <br>

      <fieldset>
        <legend>Descripción de la Propiedad</legend>

        <label for="tipo">Tipo de Propiedad:</label>
        <select id="tipo" name="tipo" required>
          <option value="">Seleccione un tipo...</option>
          <option value="departamento">DEPARTAMENTO</option>
          <option value="casa">CASA</option>
          <option value="galpon">GALPON</option>
          <option value="edificio">EDIFICIO</option>
          <option value="oficina">OFICINA</option>
          <option value="negocio">NEGOCIO</option>
          <option value="local">LOCAL</option>
          <option value="lote">LOTE</option>
          <option value="cochera">COCHERA</option>
          <option value="campo">CAMPO</option>
          <option value="quinta">QUINTA</option>
          <option value="loft">LOFT</option>
        </select>
        <br><br>

        <label for="operacion">Operación:</label>
        <select id="operacion" name="operacion" required>
          <option value="">Seleccione una operación...</option>
          <option value="alquiler">Alquiler</option>
          <option value="venta">Venta</option>
          <option value="venta_alquiler">Venta y Alquiler</option>
          <option value="alquiler_temporario">Alquiler temporario</option>
        </select>
        <br><br>

        <label for="ambientes">Ambientes:</label>
        <select id="ambientes" name="ambientes" required>
          <option value="">Seleccione cantidad...</option>
          <option value="monoambiente">MONOAMBIENTE</option>
          <option value="2_ambientes">2 AMBIENTES</option>
          <option value="3_ambientes">3 AMBIENTES</option>
          <option value="4_ambientes">4 AMBIENTES</option>
          <option value="5_ambientes">5 AMBIENTES</option>
          <option value="6_ambientes">6 AMBIENTES</option>
          <option value="7_o_mas">7 AMBIENTES O MAS</option>
          <option value="6_ambientes_5_dormitorios">6 AMBIENTES 5 DORMITORIOS</option>
          <option value="amb_prueba">AMB PRUEBA</option>
        </select>
        <br><br>

        <label for="localidad">Localidad:</label>
        <input type="text" id="localidad" name="localidad" required />
        <br><br>

        <label for="barrio">Barrio:</label>
        <input type="text" id="barrio" name="barrio" required />
        <br><br>

        <label for="direccion">Dirección:</label>
        <input type="text" id="direccion" name="direccion" required />
        <br><br>

        <label for="superficie_total">Superficie Total (m²):</label>
        <input type="number" id="superficie_total" name="superficie_total" required />
        <br><br>

        <label for="superficie_cubierta">Superficie Cubierta (m²):</label>
        <input type="number" id="superficie_cubierta" name="superficie_cubierta" required />
      </fieldset>
      <br>

      <button type="submit">Enviar solicitud de Tasación</button>
    </form>
  </main>
</body>
</html>
